<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
</head>

<body  style="background-color: aliceblue">

    <h1 align="center" style="background-color:rgb(186, 248, 248); padding: 10px;">Student Portal</h1>
    <hr>

    <h2 align="center"  style="background-color:rgb(186, 248, 248); padding: 10px;">Contact Us</h2>

    <form>

        <table align="center" cellpadding="10">

            <tr>
                <td><b>Full Name</b></td>
                <td><input type="text" placeholder="Enter your name"></td>
            </tr>

            <tr>
                <td><b>Email</b></td>
                <td><input type="email" placeholder="Enter your email"></td>
            </tr>

            <tr>
                <td><b>Phone Number</b></td>
                <td><input type="tel" placeholder="Enter your phone number"></td>
            </tr>

            <tr>
                <td><b>Subject</b></td>
                <td><input type="text" placeholder="Enter subject"></td>
            </tr>

            <tr>
                <td><b>Message</b></td>
                <td>
                    <textarea rows="5" cols="30" placeholder="Write your message"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Send Message">
                    <input type="reset" value="Clear">
                </td>
            </tr>

        </table>

    </form>
